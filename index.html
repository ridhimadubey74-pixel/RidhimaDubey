<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner | Notes & AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ===== CSS START ===== */
:root {
  --bg: #090b18;
  --surface: rgba(14, 16, 36, 0.95);
  --text: #e7eefc;
  --muted: #a3b0ce;
  --accent: #8b5cf6;
  --accent-2: #38bdf8;
}

body {
  margin: 0;
  padding: 20px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: linear-gradient(180deg, #050712, #090b18);
  color: var(--text);
}

.card {
  background: var(--surface);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  cursor: pointer;
}

.note-card, .todo-item {
  background: #11152f;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.todo-item {
  display: flex;
  justify-content: space-between;
}

.completed {
  text-decoration: line-through;
  color: var(--muted);
}

.chat-window {
  height: 200px;
  overflow-y: auto;
  background: #0f1330;
  padding: 10px;
  border-radius: 10px;
}

.chat-bubble {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
}

.bot { background: #1e3a8a; }
.user { background: #7c3aed; text-align: right; }
/* ===== CSS END ===== */
</style>
</head>

<body>

<h1>📚 Study Planner Dashboard</h1>

<div class="card">
  <h2>Quick Notes</h2>
  <form id="note-form">
    <input id="note-title" placeholder="Title">
    <textarea id="note-body" placeholder="Write notes..."></textarea>
    <button type="submit">Save Note</button>
  </form>
  <div id="notes-list"></div>
</div>

<div class="card">
  <h2>To-Do List</h2>
  <form id="todo-form">
    <input id="todo-input" placeholder="New task">
    <button type="submit">Add Task</button>
  </form>
  <div id="todo-items"></div>
</div>

<div class="card">
  <h2>AI Assistant</h2>
  <div id="ai-messages" class="chat-window"></div>
  <form id="ai-form">
    <input id="ai-input" placeholder="Ask something...">
    <button type="submit">Ask</button>
  </form>
</div>

<script>
// ===== JS START =====

const noteForm = document.getElementById('note-form');
const noteTitle = document.getElementById('note-title');
const noteBody = document.getElementById('note-body');
const notesList = document.getElementById('notes-list');

const todoForm = document.getElementById('todo-form');
const todoInput = document.getElementById('todo-input');
const todoItems = document.getElementById('todo-items');

const aiForm = document.getElementById('ai-form');
const aiInput = document.getElementById('ai-input');
const aiMessages = document.getElementById('ai-messages');

let notes = JSON.parse(localStorage.getItem('notes')) || [];
let todos = JSON.parse(localStorage.getItem('todos')) || [];

// Notes
function renderNotes() {
  notesList.innerHTML = '';
  notes.forEach(note => {
    const div = document.createElement('div');
    div.className = 'note-card';
    div.innerHTML = `<h3>${note.title}</h3><p>${note.body}</p>`;
    notesList.appendChild(div);
  });
}

noteForm.onsubmit = e => {
  e.preventDefault();
  notes.push({ title: noteTitle.value, body: noteBody.value });
  localStorage.setItem('notes', JSON.stringify(notes));
  noteTitle.value = '';
  noteBody.value = '';
  renderNotes();
};

// Todos
function renderTodos() {
  todoItems.innerHTML = '';
  todos.forEach((todo, i) => {
    const div = document.createElement('div');
    div.className = 'todo-item';

    const text = document.createElement('span');
    text.textContent = todo.text;
    if (todo.done) text.classList.add('completed');

    const btn = document.createElement('button');
    btn.textContent = '✔';
    btn.onclick = () => {
      todos[i].done = !todos[i].done;
      localStorage.setItem('todos', JSON.stringify(todos));
      renderTodos();
    };

    div.append(text, btn);
    todoItems.appendChild(div);
  });
}

todoForm.onsubmit = e => {
  e.preventDefault();
  todos.push({ text: todoInput.value, done: false });
  localStorage.setItem('todos', JSON.stringify(todos));
  todoInput.value = '';
  renderTodos();
};

// AI Chat
function reply(q) {
  q = q.toLowerCase();
  if (q.includes('plan')) return "Study 45 mins + 10 min break.";
  if (q.includes('quiz')) return "1. Define concept\n2. Give example";
  return "Make short notes with key points.";
}

function addMsg(msg, type) {
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + type;
  div.textContent = msg;
  aiMessages.appendChild(div);
}

aiForm.onsubmit = e => {
  e.preventDefault();
  const q = aiInput.value;
  addMsg(q, 'user');
  aiInput.value = '';
  setTimeout(() => addMsg(reply(q), 'bot'), 500);
};

renderNotes();
renderTodos();

// ===== JS END =====
</script>

</body>
</html>
